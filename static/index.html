<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenbook Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: #1a5276;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      flex-shrink: 0;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .3px; }
    header span {
      font-size: .75rem;
      background: rgba(255,255,255,.15);
      padding: 3px 10px;
      border-radius: 20px;
    }
    #model-select {
      margin-left: auto;
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: .78rem;
      cursor: pointer;
      outline: none;
    }
    #model-select option { background: #1a5276; color: #fff; }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 820px;
      overflow-y: auto;
      padding: 24px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .msg.user .avatar { background: #1a5276; color: #fff; }
    .msg.bot  .avatar { background: #eaf0fb; color: #1a5276; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: .93rem;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #1a5276;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* images inside bot bubble */
    .bubble .imgs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .bubble .imgs img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      transition: opacity .15s;
    }
    .bubble .imgs img:hover { opacity: .88; }

    /* sources */
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .sources a {
      font-size: .75rem;
      background: #eaf0fb;
      color: #1a5276;
      padding: 3px 9px;
      border-radius: 20px;
      text-decoration: none;
      border: 1px solid #c5d8f5;
      transition: background .15s;
    }
    .sources a:hover { background: #d0e4f7; }

    /* typing indicator */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%         { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    #bar {
      width: 100%;
      max-width: 820px;
      padding: 12px 16px 20px;
      flex-shrink: 0;
    }
    #form {
      display: flex;
      gap: 8px;
      background: #fff;
      border-radius: 28px;
      padding: 8px 8px 8px 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }
    #input {
      flex: 1;
      border: none;
      outline: none;
      font-size: .95rem;
      background: transparent;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding-top: 4px;
    }
    #send {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: #1a5276;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #send:hover:not(:disabled) { background: #154360; }
    #send:active:not(:disabled) { transform: scale(.93); }
    #send:disabled { background: #aaa; cursor: not-allowed; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.82);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 8px;
      box-shadow: 0 4px 30px rgba(0,0,0,.5);
    }
    #lightbox-close {
      position: absolute; top: 18px; right: 22px;
      color: #fff; font-size: 2rem; cursor: pointer;
      line-height: 1;
    }

    /* welcome */
    #welcome {
      margin: auto;
      text-align: center;
      color: #888;
      padding: 40px 20px;
    }
    #welcome h2 { font-size: 1.3rem; color: #444; margin-bottom: 8px; }
    #welcome p  { font-size: .9rem; }

    /* model badge in bubble footer */
    .meta-line {
      font-size: .7rem;
      color: #bbb;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
  </svg>
  <h1>Greenbook Assistant</h1>
  <span>Hybrid RAG · PG&amp;E Manual</span>
  <select id="model-select">
    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
    <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
  </select>
</header>

<div id="chat">
  <div id="welcome">
    <h2>Ask anything about the Greenbook manual</h2>
    <p>Transformer clearances, equipment specs, safety requirements, diagrams&hellip;</p>
  </div>
</div>

<div id="bar">
  <form id="form" onsubmit="return false;">
    <textarea id="input" rows="1" placeholder="Ask a question…" autocomplete="off"></textarea>
    <button id="send" type="submit" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </form>
</div>

<div id="lightbox">
  <span id="lightbox-close" onclick="closeLightbox()">&#x2715;</span>
  <img id="lightbox-img" src="" alt="diagram" />
</div>

<script>
  const chat   = document.getElementById('chat');
  const input  = document.getElementById('input');
  const sendBtn= document.getElementById('send');
  const form   = document.getElementById('form');
  const welcome= document.getElementById('welcome');

  // auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  form.addEventListener('submit', submit);

  function appendMsg(role, html, sources = [], images = [], meta = null) {
    welcome.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const av = document.createElement('div');
    av.className = 'avatar';
    av.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v1h20v-1c0-3.3-6.7-5-10-5z"/></svg>';

    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;

    if (images.length) {
      const imgRow = document.createElement('div');
      imgRow.className = 'imgs';
      images.forEach(b64 => {
        const im = document.createElement('img');
        im.src = 'data:image/png;base64,' + b64;
        im.alt = 'diagram';
        im.onclick = () => openLightbox(im.src);
        imgRow.appendChild(im);
      });
      bub.appendChild(imgRow);
    }

    if (sources.length) {
      const row = document.createElement('div');
      row.className = 'sources';
      sources.forEach(s => {
        const a = document.createElement('a');
        a.href = s.url || '#';
        a.target = '_blank';
        a.textContent = `p. ${s.pageno}`;
        a.title = s.title;
        row.appendChild(a);
      });
      bub.appendChild(row);
    }

    if (meta) {
      const m = document.createElement('div');
      m.className = 'meta-line';
      m.textContent = `${meta.modelused} · ${meta.totaltimems}ms · ${meta.totaltokens} tokens`;
      bub.appendChild(m);
    }

    wrap.appendChild(av);
    wrap.appendChild(bub);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing';
    wrap.innerHTML = `<div class="avatar"><svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v1h20v-1c0-3.3-6.7-5-10-5z"/></svg></div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function submit() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMsg('user', escHtml(q));
    const typing = addTyping();

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, model: document.getElementById('model-select').value, ragapproach: 'hybrid' })
      });
      const data = await res.json();
      typing.remove();

      if (data.status === 'error') {
        appendMsg('bot', `<span style="color:#c0392b">⚠ ${escHtml(data.answer)}</span>`);
      } else {
        const imgs = (data.images || []).map(i => i.image_base64);
        appendMsg('bot', escHtml(data.answer), data.sources || [], imgs, data.metadata);
      }
    } catch (err) {
      typing.remove();
      appendMsg('bot', `<span style="color:#c0392b">⚠ Could not reach the API. Is uvicorn running?</span>`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
